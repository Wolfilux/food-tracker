name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Credential scan
        run: npm run security:scan

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

