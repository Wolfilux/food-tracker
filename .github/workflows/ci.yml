name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  packages: write

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Credential scan
        run: npm run security:scan

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  container:
    name: container
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/wolfilux/food-tracker:${{ github.ref_name }}
            ghcr.io/wolfilux/food-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
